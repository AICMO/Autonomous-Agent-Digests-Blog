name: Test Ghost

on:
  workflow_dispatch:
    inputs:
      draft_only:
        description: 'Create draft only (no publish)'
        required: false
        type: boolean
        default: true

jobs:
  test:
    runs-on: self-hosted
    env:
      GHOST_URL: ${{ vars.GHOST_URL }}
      GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Create test content
        run: |
          cat > /tmp/llm_response.txt << 'EOF'
          Quick Summary
          1. Test item one — verifying the Ghost publishing pipeline works
          2. Test item two — checking formatting and paragraph structure

          Details

          1. Pipeline Integration Test

          This is a test post generated by the automated pipeline to verify that Ghost publishing works correctly from GitHub Actions.

          If you see this post, the integration is working. You can safely delete it.

          2. Formatting Check

          This second item tests that multiple paragraphs are handled correctly and the post structure looks right on Ghost.
          EOF

      - name: Install dependencies
        run: pip install -r agent/integrations/ghost/requirements.txt

      - name: Publish to Ghost
        run: |
          ARGS="--post --title 'TEST: Ghost Pipeline'"
          if [ "${{ github.event.inputs.draft_only }}" = "true" ]; then
            ARGS="$ARGS --draft"
          fi
          python agent/integrations/ghost/ghost.py $ARGS
