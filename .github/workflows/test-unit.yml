name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r agent/integrations/telegram/requirements.txt
          pip install -r agent/integrations/ghost/requirements.txt
          pip install -r agent/integrations/substack/requirements.txt

      - name: Run tests
        run: python -m pytest agent/integrations/ -v
